name: lift_lab
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+2

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  # For the Charts (recharts equivalent)
  fl_chart: ^0.65.0
  # For LocalStorage equivalent
  shared_preferences: ^2.2.2
  # For Date formatting
  intl: ^0.19.0
  # For File Import/Export
  path_provider: ^2.1.2
  file_picker: ^8.0.0
  share_plus: ^7.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#1E293B"
    theme_color: "#3B82F6"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"
  linux:
    generate: true
    image_path: "assets/icon/icon.png"
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21 # Android min sdk min:16, default 21
  adaptive_icon_background: "#1E293B" # android adaptive icon background color
  adaptive_icon_foreground: "assets/icon/icon.png" # android adaptive icon foreground image
